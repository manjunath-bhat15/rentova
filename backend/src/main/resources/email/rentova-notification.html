<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="x-apple-disable-message-reformatting">
  <title>{{headline}}</title>
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; background: #fff8f3; }
    a { color: #fc8019; text-decoration: none; }
    .wrapper { width: 100%; background: #fff8f3; }
    .container { width: 520px; max-width: 520px; margin: 0 auto; }
    .header { padding: 44px 0 24px; text-align: center; }
    .brand { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 24px; line-height: 1; font-weight: 800; color: #111827; display: inline-block; tracking-spacing: -0.5px; }
    .brand-mark { display: inline-block; width: 36px; height: 36px; line-height: 36px; border-radius: 10px; background: #fc8019; color: #ffffff; margin-right: 8px; font-weight: 900; text-align: center; font-size: 20px; }
    .card { background: #ffffff; border: 1.5px solid #f1f1eb; border-radius: 20px; box-shadow: 0 8px 24px rgba(252, 128, 25, 0.04); }
    .card-body { padding: 44px 48px; }
    .eyebrow { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; line-height: 1.4; color: #fc8019; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 14px; }
    .headline { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 24px; line-height: 1.25; color: #111827; font-weight: 900; margin: 0 0 18px; text-align: center; letter-spacing: -0.5px; }
    .copy { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.65; color: #4b5563; margin: 0 0 26px; text-align: center; }
    .btn-container { text-align: center; margin-bottom: 26px; }
    .button { display: inline-block; background: #fc8019; color: #ffffff !important; border-radius: 12px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; padding: 14px 28px; text-decoration: none; box-shadow: 0 4px 14px rgba(252, 128, 25, 0.3); }
    .footer { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; line-height: 1.65; color: #6b7280; text-align: center; }
    .footer a { color: #fc8019; text-decoration: underline; }

    @media screen and (max-width: 540px) {
      .container { width: 100% !important; }
      .card-body { padding: 32px 24px !important; }
      .headline { font-size: 20px !important; }
    }
  </style>
</head>
<body>
  <table role="presentation" class="wrapper" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table role="presentation" class="container" width="520" cellpadding="0" cellspacing="0">
          <!-- Logo Header -->
          <tr>
            <td class="header">
              <div class="brand"><span class="brand-mark">R</span>Rentova</div>
            </td>
          </tr>

          <!-- Card Content -->
          <tr>
            <td class="card">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td class="card-body">
                    <div class="eyebrow">{{eyebrow}}</div>
                    <h1 class="headline">{{headline}}</h1>
                    <p class="copy">{{intro}}</p>

                    <!-- CTA Button -->
                    <div class="btn-container">
                      <a class="button" href="{{primaryCtaUrl}}">{{primaryCtaText}}</a>
                    </div>

                    <p class="copy" style="font-size: 12px; margin-bottom: 0; color: #6b7280;">{{secondaryText}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 32px 24px 44px;">
              <p class="footer" style="margin: 0 0 8px;">
                <strong style="color: #111827;">Rentova Marketplace</strong><br>
                Bangalore, India &bull; <a href="mailto:{{contactEmail}}">{{contactEmail}}</a>
              </p>
              <p class="footer" style="margin: 0;">
                Trusted local rentals and secure smart bookings.<br>
                You are receiving this transactional update because you have a Rentova account.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
