databases:
  - name: rentova-db
    databaseName: rentova
    user: rentova_user
    plan: free

services:
  - type: web
    name: rentova-backend
    env: docker
    plan: free
    region: oregon
    rootDir: backend
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: rentova-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # Update this to your Vercel URL once deployed
