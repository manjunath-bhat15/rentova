<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="x-apple-disable-message-reformatting">
  <title>Verify your Rentova account</title>
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; background: #fff8ea; }
    a { color: #151f35; text-decoration: none; }
    .wrapper { width: 100%; background: #fff8ea; }
    .container { width: 520px; max-width: 520px; margin: 0 auto; }
    .header { padding: 40px 0 20px; text-align: center; }
    .brand { font-family: 'Courier New', Courier, monospace; font-size: 26px; line-height: 1; font-weight: 700; color: #151f35; display: inline-block; }
    .brand-mark { display: inline-block; padding: 8px 11px; border-radius: 8px; background: #151f35; color: #fff8ea; margin-right: 8px; font-weight: 700; }
    .card { background: #ffffff; border: 1px solid #eadfca; border-radius: 16px; box-shadow: 0 4px 12px rgba(21, 31, 53, 0.03); }
    .card-body { padding: 40px 44px; }
    .eyebrow { font-family: 'Courier New', Courier, monospace; font-size: 11px; line-height: 1.4; color: #376e2e; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 12px; }
    .headline { font-family: 'Courier New', Courier, monospace; font-size: 28px; line-height: 1.2; color: #151f35; font-weight: 700; margin: 0 0 16px; text-align: center; }
    .copy { font-family: Verdana, Geneva, sans-serif; font-size: 14px; line-height: 1.6; color: #445066; margin: 0 0 24px; text-align: center; }
    .otp-container { background: #fbf9f4; border: 1.5px dashed #376e2e; border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 24px; }
    .otp-label { font-family: 'Courier New', Courier, monospace; font-size: 11px; color: #768097; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700; }
    .otp-code { font-family: 'Courier New', Courier, monospace; font-size: 36px; line-height: 1; color: #151f35; letter-spacing: 8px; font-weight: 700; margin: 0; padding-left: 8px; }
    .btn-container { text-align: center; margin-bottom: 24px; }
    .button { display: inline-block; background: #151f35; color: #fff8ea !important; border-radius: 30px; font-family: 'Courier New', Courier, monospace; font-size: 15px; font-weight: 700; font-style: italic; padding: 12px 28px; text-decoration: none; box-shadow: 0 4px 8px rgba(21, 31, 53, 0.15); }
    .divider { border-top: 1px solid #eadfca; margin: 24px 0; }
    .footer { font-family: Verdana, Geneva, sans-serif; font-size: 11px; line-height: 1.6; color: #768097; text-align: center; }
    .footer a { color: #768097; text-decoration: underline; }

    @media screen and (max-width: 540px) {
      .container { width: 100% !important; }
      .card-body { padding: 30px 24px !important; }
      .headline { font-size: 24px !important; }
    }
  </style>
</head>
<body>
  <table role="presentation" class="wrapper" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table role="presentation" class="container" width="520" cellpadding="0" cellspacing="0">
          <!-- Logo Header -->
          <tr>
            <td class="header">
              <div class="brand"><span class="brand-mark">R</span>Rentova</div>
            </td>
          </tr>

          <!-- Card Content -->
          <tr>
            <td class="card">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td class="card-body">
                    <div class="eyebrow">{{eyebrow}}</div>
                    <h1 class="headline">{{headline}}</h1>
                    <p class="copy">{{intro}}</p>

                    <!-- OTP Code Box -->
                    <div class="otp-container">
                      <div class="otp-label">One-Time Verification Code</div>
                      <div class="otp-code">{{otpCode}}</div>
                    </div>

                    <!-- CTA Button -->
                    <div class="btn-container">
                      <a class="button" href="{{primaryCtaUrl}}">{{primaryCtaText}}</a>
                    </div>

                    <p class="copy" style="font-size: 12px; margin-bottom: 0;">{{secondaryText}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 30px 24px 40px;">
              <p class="footer" style="margin: 0 0 8px;">
                <strong style="color: #151f35;">Rentova Marketplace</strong><br>
                Bangalore, India &bull; <a href="mailto:{{contactEmail}}">{{contactEmail}}</a>
              </p>
              <p class="footer" style="margin: 0;">
                Trusted local rentals and secure smart bookings.<br>
                If you did not request this email, please ignore it.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
