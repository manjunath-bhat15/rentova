spring:
  application:
    name: rentova

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:manjubhat8105@gmail.com}
    password: ${SPRING_MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  # Local Development Database (H2)
  datasource:
    url: jdbc:h2:mem:rentova
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

  tomcat:
    max-http-form-post-size: -1

# Application Configuration
app:
  name: Rentova
  allow-otp-bypass: true  # Enables '123456' shortcut for rapid frontend development

  jwt:
    secret: rentova-super-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm-security
    expiration-ms: 86400000

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

---
# =========================
# PRODUCTION CONFIGURATION
# =========================
spring:
  config:
    activate:
      on-profile: prod

  # Gmail SMTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  # PostgreSQL Database
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
  allow-otp-bypass: false # Hard constraint: completely disables testing backdoors in production

  cors:
    allowed-origins: ${CORS_ORIGINS}